site_name: OWASP Top 10:2025 — Guia Didático
site_description: Aprenda as 10 principais vulnerabilidades web de 2025
site_author: Anderson Contreira
docs_dir: docs

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: slate
      primary: red
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Tema claro
    - scheme: default
      primary: red
      accent: orange
      toggle:
        icon: material/weather-night
        name: Tema escuro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - def_list
  - footnotes
  - tables

plugins:
  - search:
      lang: pt
  - awesome-pages

nav:
  - Início: index.md
  - Introdução: introducao.md
  - Vulnerabilidades:
      - vulnerabilidades/a01-broken-access-control.md
      - vulnerabilidades/a02-security-misconfiguration.md
      - vulnerabilidades/a03-software-supply-chain-failures.md
      - vulnerabilidades/a04-cryptographic-failures.md
      - vulnerabilidades/a05-injection.md
      - vulnerabilidades/a06-insecure-design.md
      - vulnerabilidades/a07-authentication-failures.md
      - vulnerabilidades/a08-software-data-integrity-failures.md
      - vulnerabilidades/a09-security-logging-alerting-failures.md
      - vulnerabilidades/a10-mishandling-exceptional-conditions.md
  - Extras:
      - extras/glossario.md
      - extras/ferramentas.md
      - extras/proximos-passos.md